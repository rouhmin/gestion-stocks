<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Stocks</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-raised: #1c2333;
            --border: rgba(255,255,255,0.08);
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.25);
            --accent-2: #3fb950;
            --text-primary: #e6edf3;
            --text-muted: #8b949e;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(88,166,255,0.12) 0%, transparent 70%);
            top: -100px; left: -100px;
            animation: drift 14s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(63,185,80,0.1) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            animation: drift 18s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift {
            from { transform: translate(0, 0); }
            to   { transform: translate(40px, 30px); }
        }

        /* Page wrapper */
        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 56px;
            width: 100%;
            max-width: 700px;
        }

        /* Header */
        .header {
            text-align: center;
            animation: fadeDown 0.7s ease both;
        }
        .header .icon-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--accent), #1f6feb);
            border-radius: 18px;
            font-size: 28px;
            margin-bottom: 18px;
            box-shadow: 0 0 30px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            color: var(--text-primary);
            letter-spacing: -0.03em;
            line-height: 1.1;
        }
        h1 span {
            color: var(--accent);
        }
        .header p {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }
        @media (max-width: 560px) {
            .grid { grid-template-columns: 1fr; }
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
            animation: fadeUp 0.6s ease both;
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow), 0 0 0 1px var(--accent-glow);
            border-color: rgba(88,166,255,0.3);
        }

        /* Card header (trigger button) */
        .card-trigger {
            width: 100%;
            background: none;
            border: none;
            padding: 22px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
            color: var(--text-primary);
            border-bottom: 1px solid transparent;
            transition: background 0.2s, border-color 0.2s;
        }
        .card-trigger:hover {
            background: var(--surface-raised);
        }
        .card-trigger.open {
            border-bottom-color: var(--border);
            background: var(--surface-raised);
        }

        .card-trigger .emoji {
            font-size: 22px;
            flex-shrink: 0;
            transition: transform 0.3s;
        }
        .card-trigger.open .emoji { transform: rotate(-10deg) scale(1.1); }

        .card-trigger .label {
            flex: 1;
        }
        .card-trigger .label strong {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .card-trigger .label span {
            display: block;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-trigger .chevron {
            width: 20px; height: 20px;
            color: var(--text-muted);
            transition: transform 0.3s ease, color 0.2s;
            flex-shrink: 0;
        }
        .card-trigger.open .chevron {
            transform: rotate(180deg);
            color: var(--accent);
        }

        /* Dropdown panel */
        .dropdown-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dropdown-panel.open {
            max-height: 400px;
        }

        .dropdown-panel a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 24px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 400;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s, color 0.15s, padding-left 0.2s;
        }
        .dropdown-panel a:last-child { border-bottom: none; }
        .dropdown-panel a::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.2s, transform 0.2s;
        }
        .dropdown-panel a:hover {
            background: rgba(88,166,255,0.06);
            color: var(--accent);
            padding-left: 30px;
        }
        .dropdown-panel a:hover::before {
            background: var(--accent);
            transform: scale(1.5);
        }

        /* Footer note */
        .footer {
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            animation: fadeUp 0.6s 0.4s ease both;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="header">
        <div class="icon-badge">📦</div>
        <h1>Gestion de <span>Stocks</span></h1>
        <p>Sélectionnez un module pour commencer</p>
    </div>

    <div class="grid">

        <!-- Card 1 -->
        <div class="card">
            <button class="card-trigger" id="budgetBtn" aria-expanded="false">
                <span class="emoji">📊</span>
                <span class="label">
                    <strong>Budget des Approvisionnements</strong>
                    <span>2 méthodes disponibles</span>
                </span>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            <div class="dropdown-panel" id="budgetDropdown">
                <a href="index0.html">Quantités constantes</a>
                <a href="index1.html">Périodicité régulière</a>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <button class="card-trigger" id="evalBtn" aria-expanded="false">
                <span class="emoji">🗂️</span>
                <span class="label">
                    <strong>Évaluation des Stocks</strong>
                    <span>4 méthodes disponibles</span>
                </span>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            <div class="dropdown-panel" id="evalDropdown">
                <a href="index2.html">Méthode CUMP périodique</a>
                <a href="index3.html">CMUP à chaque entrée</a>
                <a href="index4.html">Méthode FIFO (PEPS)</a>
                <a href="index5.html">Méthode LIFO (DEPS)</a>
            </div>
        </div>

    </div>

    <p class="footer">© created by rouhmin</p>

</div>

<script>
    function setupCard(btnId, panelId) {
        const btn = document.getElementById(btnId);
        const panel = document.getElementById(panelId);

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = panel.classList.contains('open');

            // Close all
            document.querySelectorAll('.dropdown-panel').forEach(p => p.classList.remove('open'));
            document.querySelectorAll('.card-trigger').forEach(b => {
                b.classList.remove('open');
                b.setAttribute('aria-expanded', 'false');
            });

            if (!isOpen) {
                panel.classList.add('open');
                btn.classList.add('open');
                btn.setAttribute('aria-expanded', 'true');
            }
        });
    }

    setupCard('budgetBtn', 'budgetDropdown');
    setupCard('evalBtn', 'evalDropdown');

    window.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-panel').forEach(p => p.classList.remove('open'));
        document.querySelectorAll('.card-trigger').forEach(b => {
            b.classList.remove('open');
            b.setAttribute('aria-expanded', 'false');
        });
    });
</script>

</body>
</html>
