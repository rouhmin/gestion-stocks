<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget - Quantités Constantes à Périodicité Régulière</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 40px; }
        h3 { color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 30px; }

        .conso-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        .input-box label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .input-box input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }

        .params-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }

        .btn-calc { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-calc:hover { background: #219150; }

        #results { margin-top: 40px; display: none; }
        .stats-bar { display: flex; justify-content: space-around; background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #d1d9e6; flex-wrap: wrap; gap: 10px; }
        .stats-bar span { font-size: 14px; }

        /* Avertissement Wilson */
        .wilson-warning { background: #fff8e1; border: 1px solid #f9a825; border-radius: 8px; padding: 12px 16px; margin-bottom: 15px; color: #7a5c00; font-size: 14px; display: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #dee2e6; padding: 10px 12px; text-align: center; font-size: 14px; }
        th { background-color: #34495e; color: white; }
        .initial-row { background-color: #f1f1f1 !important; font-weight: bold; }
        .neg-val { color: #e74c3c; font-weight: bold; }
        .zero-val { color: #e67e22; font-weight: bold; }
        .has-livraison { background-color: #eafaf1; }
        .has-rupture { background-color: #fdf2f2; }

        /* Modale d'erreur personnalisée */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 14px; padding: 30px 35px; max-width: 480px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.25); animation: popIn 0.2s ease; }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { font-size: 18px; font-weight: bold; color: #c0392b; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .modal-body { font-size: 14px; color: #444; line-height: 1.7; }
        .modal-body ul { margin: 10px 0 0 15px; padding: 0; }
        .modal-body ul li { margin-bottom: 6px; }
        .modal-body li::marker { color: #e74c3c; }
        .modal-btn { margin-top: 22px; background: #e74c3c; color: white; border: none; padding: 11px 28px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; float: right; transition: 0.2s; }
        .modal-btn:hover { background: #c0392b; }

        /* ── Responsive mobile ── */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px 10px; border-radius: 8px; }
            h1 { font-size: 18px; margin-bottom: 20px; }
            h3 { font-size: 15px; }
            .conso-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .params-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .input-box input { padding: 9px; font-size: 13px; }
            .btn-calc { font-size: 15px; padding: 12px; }
            .stats-bar { flex-direction: column; gap: 6px; padding: 12px; }
            table { font-size: 11px; }
            th, td { padding: 6px 4px; }
            #results, #synthese { overflow-x: auto; }
            #results table, #synthese table { min-width: 480px; }
            .synthese-wrap { overflow-x: auto; }
        }

        /* Tableau de synthèse */
        #synthese { margin-top: 40px; display: none; }
        #synthese h3 { color: #8e44ad; border-bottom: 2px solid #8e44ad; padding-bottom: 5px; margin-bottom: 15px; }
        .synthese-wrap { overflow-x: auto; }
        #synthese table { width: auto; min-width: 100%; border-collapse: collapse; }
        #synthese th, #synthese td { border: 1px solid #dee2e6; padding: 9px 14px; text-align: center; font-size: 13px; white-space: nowrap; }
        #synthese thead th { background-color: #6c3483; color: white; }
        #synthese th.row-label { background-color: #34495e; color: white; text-align: left; min-width: 110px; }
        #synthese tr:nth-child(1) td { background-color: #f5eef8; font-weight: bold; color: #6c3483; }
        #synthese tr:nth-child(2) td { background-color: #eafaf1; font-weight: bold; color: #1e8449; }
        #synthese tr:nth-child(3) td { background-color: #fdf2f2; color: #c0392b; }
        #synthese tr:nth-child(4) td { background-color: #eaf4fb; color: #1a5276; font-weight: bold; }
        #synthese td.empty-cell { background-color: #f9f9f9 !important; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Budget de Commandes – Quantités à Périodicité Régulière</h1>

    <!-- Modale d'erreur -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-title">⚠️ Champs obligatoires manquants</div>
            <div class="modal-body" id="modalBody"></div>
            <button class="modal-btn" onclick="fermerModal()">Corriger</button>
            <div style="clear:both"></div>
        </div>
    </div>

    <h3>1. Consommations Mensuelles (kg)</h3>
    <div class="conso-grid" id="consoInputs"></div>

    <h3>2. Paramètres de Gestion</h3>
    <div class="params-grid">
        <div class="input-box">
            <label>Stock Initial (kg)</label>
            <input type="number" id="stock_init" placeholder="en Kg">
        </div>
        <div class="input-box">
            <label>Coût de passation (f)</label>
            <input type="number" id="f_cost" placeholder="KMGA">
        </div>
        <div class="input-box">
            <label>Taux de possession (t %)</label>
            <input type="number" id="t_rate" placeholder="ex: 10">
        </div>
        <div class="input-box">
            <label>Prix d'achat unitaire</label>
            <input type="number" id="pu_price" placeholder="KMGA">
        </div>
    </div>

    <button class="btn-calc" onclick="calculerTout()">Calculer et Afficher le Tableau</button>

    <div id="results">
        <div class="wilson-warning" id="wilsonWarning"></div>
        <div class="stats-bar" id="statsDisplay"></div>
        <table>
            <thead>
                <tr>
                    <th rowspan="2">Périodes</th>
                    <th rowspan="2">Consommation</th>
                    <th rowspan="2">Stock avec rupture év.</th>
                    <th rowspan="2">Livraison</th>
                    <th rowspan="2">Stock Modifié</th>
                    <th colspan="2">Commandes</th>
                </tr>
                <tr>
                    <th>Date</th>
                    <th>Quantité</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="synthese">
        <h3>📊 Tableau de Synthèse</h3>
        <div class="synthese-wrap">
            <table id="syntheseTable">
                <thead id="syntheseHead"></thead>
                <tbody id="syntheseBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const mois = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

    // Génération des champs de consommation
    const container = document.getElementById('consoInputs');
    mois.forEach((m) => {
        container.innerHTML += `
            <div class="input-box">
                <label>${m}</label>
                <input type="number" class="val-conso" placeholder="0">
            </div>`;
    });

    function fermerModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }

    function calculerTout() {
        const inputs = document.querySelectorAll('.val-conso');
        const consommations = Array.from(inputs).map(inp => parseFloat(inp.value) || 0);

        const stockInitial = parseFloat(document.getElementById('stock_init').value) || 0;
        const f           = parseFloat(document.getElementById('f_cost').value)    || 0;
        const t           = parseFloat(document.getElementById('t_rate').value)    || 0;
        const pu          = parseFloat(document.getElementById('pu_price').value)  || 0;

        // Délai fixe : 2 mois avant livraison
        const delaiTotal  = 2;
        const delaiZero   = 2;

        // ── Vérifications préalables ─────────────────────────────────────────
        const warningDiv = document.getElementById('wilsonWarning');
        warningDiv.style.display = 'none';
        warningDiv.innerHTML = '';

        const C_kg  = consommations.reduce((a, b) => a + b, 0);
        const C_val = C_kg * pu;

        if (f === 0 || t === 0 || pu === 0 || C_kg === 0) {
            let items = [];
            if (C_kg === 0) items.push("Veuillez saisir au moins une <strong>consommation mensuelle</strong> (en kg).");
            if (pu   === 0) items.push("Veuillez renseigner le <strong>prix d'achat unitaire</strong> (KMGA).");
            if (f    === 0) items.push("Veuillez renseigner le <strong>coût de passation (f)</strong> (KMGA).");
            if (t    === 0) items.push("Veuillez renseigner le <strong>taux de possession (t)</strong> en %.");

            document.getElementById('modalBody').innerHTML =
                "Merci de compléter les informations suivantes avant de lancer le calcul :"
                + "<ul>" + items.map(i => `<li>${i}</li>`).join('') + "</ul>";
            document.getElementById('modalOverlay').classList.add('active');
            return;
        }

        // ── 1. Wilson ────────────────────────────────────────────────────────
        // N = sqrt(C*t / 200*f)  (t en %, pas en décimal)
        let N_exact = Math.sqrt((C_val * t) / (200 * f));

        // Arrondi au plus proche entier ≥ 1
        let N = Math.round(N_exact);
        if (N < 1) N = 1;   // ← CORRECTION : on force N à 1 minimum au lieu d'alerter

        // Avertir si N_exact était < 0.5 (arrondi naturel aurait donné 0)
        if (N_exact < 0.5) {
            warningDiv.innerHTML = `⚠️ La cadence théorique est très faible (N_exact = ${N_exact.toFixed(4)}). 
                Elle a été arrondie à <strong>N = 1</strong> commande par an pour permettre le calcul. 
                Vérifiez que vos unités sont cohérentes (taux t en %, f et pu dans la même devise).`;
            warningDiv.style.display = 'block';
        }

        // Lot économique : Qe = C_kg / N
        const Qe = Math.round(C_kg / N);
        // Période entre deux commandes (en mois)
        const periode = Math.round(12 / N);

        document.getElementById('statsDisplay').innerHTML = `
            <span><strong>Conso. Annuelle :</strong> ${C_kg} kg</span>
            <span><strong>Cadence (N) :</strong> √(${C_val}×${t} / 200×${f}) = ${N_exact.toFixed(2)} ≈ <strong>${N}</strong></span>
            <span><strong>Lot Économique (Qe) :</strong> ${C_kg}/${N} = ${Qe} kg</span>
        `;

        // ── 2. Préparation des lignes (décembre + 12 mois) ───────────────────
        let lignes = [{
            nom: "31/12", conso: 0, rupture: stockInitial,
            livraison: 0, stockMod: stockInitial,
            cmdDate: "-", cmdQte: "-", isRattrapage: false
        }];
        for (let i = 0; i < 12; i++) {
            lignes.push({
                nom: mois[i], conso: consommations[i],
                rupture: 0, livraison: 0, stockMod: 0,
                cmdDate: "-", cmdQte: "-", isRattrapage: false
            });
        }

        // ── 3. Algorithme principal ──────────────────────────────────────────
        function sumConso(start, n) {
            let s = 0;
            let hasInconnu = false;
            let parts = [];
            for (let k = 0; k < n; k++) {
                const idx = start + k;
                if (idx >= 12) {
                    hasInconnu = true;
                    parts.push("X");
                } else {
                    s += consommations[idx];
                    parts.push(String(consommations[idx]));
                }
            }
            return { valeur: s, hasInconnu, texte: hasInconnu ? parts.join(" + ") : String(s) };
        }

        function nomMoisIdx(i) {
            return mois[((i - 1) % 12 + 12) % 12];
        }

        for (let i = 1; i <= 12; i++) {
            const prevIsRattrapage = lignes[i - 1].isRattrapage;
            const base = prevIsRattrapage ? lignes[i - 1].rupture : lignes[i - 1].stockMod;

            // Si le stock précédent est inconnu (X ou vide), on arrête les calculs
            if (base === 'X' || base === '' || base === undefined) {
                lignes[i].rupture  = '';
                lignes[i].stockMod = '';
                continue;
            }

            const rupture = base - lignes[i].conso;
            lignes[i].rupture = rupture;

            if (rupture < 0 && periode > 0) {
                lignes[i].isRattrapage = false;

                const startIdx = i - 1;
                const livRes = sumConso(startIdx, periode);
                const livQte = livRes.hasInconnu ? null : livRes.valeur - lignes[i - 1].rupture;
                const livTxt = livRes.hasInconnu
                    ? livRes.texte + " - " + lignes[i - 1].rupture
                    : String(livRes.valeur - lignes[i - 1].rupture);

                lignes[i - 1].livraison    = livQte !== null ? livQte : "X";
                lignes[i - 1].livraisonTxt = livTxt;
                lignes[i - 1].isRattrapage = true;

                const idxCmd = i - 1 - delaiTotal;
                lignes[i].cmdDate = "Début " + nomMoisIdx(idxCmd);
                lignes[i].cmdQte  = livTxt;

                lignes[i - 1].stockMod    = livQte !== null ? lignes[i - 1].rupture + livQte : "X";
                lignes[i - 1].stockModTxt = livQte !== null ? String(lignes[i - 1].rupture + livQte) : "X";

                lignes[i].stockMod    = livQte !== null ? lignes[i - 1].stockMod - lignes[i].conso : "";
                lignes[i].stockModTxt = livQte !== null ? String(lignes[i - 1].stockMod - lignes[i].conso) : "";

            } else if (rupture === 0 && periode > 0) {
                const startIdx = i;
                const livRes = sumConso(startIdx, periode);
                const livQte = livRes.hasInconnu ? null : livRes.valeur;
                const livTxt = livRes.texte;

                lignes[i].livraison    = livQte !== null ? livQte : "X";
                lignes[i].livraisonTxt = livTxt;
                lignes[i].isRattrapage = false;

                const idxCmd = i - delaiZero;
                lignes[i].cmdDate = "Début " + nomMoisIdx(idxCmd);
                lignes[i].cmdQte  = livTxt;

                lignes[i].stockMod    = livQte !== null ? livQte : "X";
                lignes[i].stockModTxt = livQte !== null ? livTxt : "X";

            } else {
                lignes[i].stockMod = rupture;
            }
        }

        // ── 4. Rendu du tableau ──────────────────────────────────────────────
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        lignes.forEach((l, idx) => {
            if (idx === 0) {
                tbody.innerHTML += `
                    <tr class="initial-row">
                        <td>${l.nom}</td>
                        <td>-</td>
                        <td>${l.rupture}</td>
                        <td>-</td>
                        <td>${l.stockMod}</td>
                        <td>-</td>
                        <td>-</td>
                    </tr>`;
            } else {
                const ruptureClass = l.rupture < 0 ? 'neg-val' : (l.rupture === 0 ? 'zero-val' : '');
                const rowClass     = (l.livraison && l.livraison !== 0) ? (l.isRattrapage ? 'has-rupture' : 'has-livraison') : '';
                const livDisplay   = (l.livraison && l.livraison !== 0) ? (l.livraisonTxt || l.livraison) : '-';
                const stockDisplay = (l.stockModTxt !== undefined && l.stockModTxt !== '') ? l.stockModTxt : (l.stockMod !== '' && l.stockMod !== undefined ? l.stockMod : '');
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td>${l.nom}</td>
                        <td>${l.conso || '-'}</td>
                        <td class="${ruptureClass}">${l.rupture}</td>
                        <td>${livDisplay}</td>
                        <td>${stockDisplay}</td>
                        <td>${l.cmdDate}</td>
                        <td>${l.cmdQte !== '-' ? l.cmdQte : '-'}</td>
                    </tr>`;
            }
        });

        document.getElementById('results').style.display = "block";
        // ── Tableau de synthèse ──────────────────────────────────────────────
        // Même règles que index0 + gestion des valeurs texte (X, 3950+X)
        //
        // COMMANDES  : cmdDate de chaque ligne → mois cible → placer cmdQte
        // LIVRAISONS : lignes[i].livraison sur le mois de la ligne
        // SORTIES    : lignes[i].conso sur le mois de la ligne
        // STOCKS     : lignes[0].stockMod sur col Déc initiale, puis lignes[i].stockMod
        // COLONNES   : du 1er mois de cmdDate jusqu'à Décembre + année complète

        function synParseMois(str) {
            if (!str || str === '-') return null;
            const raw = str.replace(/d[eé]but\s+/i, '').trim().toLowerCase();
            const sorted = mois.slice().sort((a, b) => b.length - a.length);
            for (let j = 0; j < sorted.length; j++) {
                if (sorted[j].toLowerCase().startsWith(raw) || raw.startsWith(sorted[j].toLowerCase().substring(0, 4))) {
                    return sorted[j];
                }
            }
            for (let j = 0; j < sorted.length; j++) {
                if (sorted[j].toLowerCase().substring(0, 3) === raw.substring(0, 3)) return sorted[j];
            }
            return null;
        }

        const synCmd  = {};
        const synLiv  = {};
        const synSort = {};
        const synStk  = {};

        for (let i = 1; i <= 12; i++) {
            const l = lignes[i];

            // Livraisons : valeur numérique ou texte (X, 3950+X)
            const livVal = l.livraisonTxt || l.livraison;
            if (livVal && livVal !== 0 && livVal !== '-') synLiv[l.nom] = livVal;

            // Sorties
            if (l.conso > 0) synSort[l.nom] = l.conso;

            // Stocks : texte ou numérique
            const stkVal = l.stockModTxt !== undefined && l.stockModTxt !== '' ? l.stockModTxt : l.stockMod;
            if (stkVal !== '' && stkVal !== undefined) synStk[l.nom] = stkVal;

            // Commandes : cmdQte peut être texte (3950+X)
            if (l.cmdDate && l.cmdDate !== '-') {
                const cible = synParseMois(l.cmdDate);
                const qte = l.cmdQte !== '-' ? l.cmdQte : '';
                if (cible && qte !== '') synCmd[cible] = qte;
            }
        }

        // 1ère colonne = mois du 1er cmdDate
        let synStart = -1;
        for (let i = 1; i <= 12; i++) {
            if (lignes[i].cmdDate && lignes[i].cmdDate !== '-') {
                const premierMois = synParseMois(lignes[i].cmdDate);
                if (premierMois) { synStart = mois.indexOf(premierMois); break; }
            }
        }
        if (synStart < 0) synStart = 0;

        // Colonnes : du mois de départ jusqu'à Déc, puis janv→déc
        const synCols = [];
        for (let k = synStart; k < 12; k++) synCols.push(mois[k]);
        for (let k = 0; k < 12; k++) synCols.push(mois[k]);

        const synJanvIdx   = synCols.indexOf('Janvier');
        const synDecIdx    = synCols.indexOf('Décembre');
        const decAvantJanv = synDecIdx >= 0 && (synJanvIdx < 0 || synDecIdx < synJanvIdx);

        // Les colonnes AVANT Janvier (ex: Nov, Déc en début) sont vides pour toutes les lignes
        // sauf Stocks (Déc initial) et Commandes (1ère occurrence du mois)
        // Pour Commandes : la valeur va sur la 1ère occurrence du mois (avant Janvier si présente)
        //                  et la 2ème occurrence (après Janvier) est vide si déjà placée avant
        const synRowCmd  = synCols.map((m, k) => {
            if (synCmd[m] === undefined) return '';
            // Si ce mois apparaît aussi avant Janvier (k >= synJanvIdx), vérifier si déjà affiché
            const firstOccurrence = synCols.indexOf(m);
            if (k === firstOccurrence) return synCmd[m]; // 1ère occurrence → afficher
            return ''; // 2ème occurrence → vide
        });
        const synRowLiv  = synCols.map((m, k) => k < synJanvIdx ? '' : (synLiv[m]  !== undefined ? synLiv[m]  : ''));
        const synRowSort = synCols.map((m, k) => k < synJanvIdx ? '' : (synSort[m] !== undefined ? synSort[m] : ''));
        const synRowStk  = synCols.map((m, k) => {
            if (decAvantJanv && k === synDecIdx) return lignes[0].stockMod; // stock initial Déc
            if (k < synJanvIdx) return ''; // colonnes avant Janvier = vides
            return synStk[m] !== undefined ? synStk[m] : '';
        });

        document.getElementById('syntheseHead').innerHTML =
            '<tr><th class="row-label">Période</th>'
            + synCols.map(m => '<th>' + m + '</th>').join('') + '</tr>';

        const synRows = [
            { label: 'Commandes',  data: synRowCmd  },
            { label: 'Livraisons', data: synRowLiv  },
            { label: 'Sorties',    data: synRowSort },
            { label: 'Stocks',     data: synRowStk  }
        ];
        document.getElementById('syntheseBody').innerHTML = synRows.map(r =>
            '<tr><th class="row-label">' + r.label + '</th>' +
            r.data.map(v => v !== '' ? '<td>' + v + '</td>' : '<td class="empty-cell"></td>').join('') +
            '</tr>'
        ).join('');

        document.getElementById('synthese').style.display = 'block';

    }
</script>

</body>
</html>
